<!DOCTYPE html>
<html>
<head>
  <title></title>

  <link rel="icon" href="icon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Source Sans 3', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    /* BACKGROUND */
    .bg {
      position: fixed;
      inset: 0;
      background: url("background1.gif") center/cover no-repeat;
      filter: blur(6px) brightness(0.55);
      transform: scale(1.05);
      z-index: -4;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: -3;
    }

    .fog {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.06), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05), transparent 45%),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.04), transparent 50%);
      filter: blur(40px);
      opacity: 0.9;
      animation: fogDrift 20s ease-in-out infinite;
    }

    @keyframes fogDrift {
      0% { transform: translate(0px, 0px); }
      50% { transform: translate(-40px, 20px); }
      100% { transform: translate(0px, 0px); }
    }

    /* RAIN */
    .rain-side {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 120px;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .left { left: 0; }
    .right { right: 0; }

    .drop {
      position: absolute;
      width: 2px;
      height: 14px;
      background: rgba(255,255,255,0.6);
      animation: fall linear infinite;
      border-radius: 999px;
    }

    @keyframes fall {
      0% { transform: translateY(-20px); opacity: 0; }
      10% { opacity: 0.7; }
      100% { transform: translateY(110vh); opacity: 0; }
    }

    /* INTRO */
    .intro {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
      font-size: 1.4rem;
      color: rgba(255,255,255,0.75);
      transition: opacity 1.2s ease;
    }

    .intro.fade-out { opacity: 0; }

    /* MAIN WRAPPER */
    #content {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(10px);
      transition: 1.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    #content.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    /* 🔷 VIEW COUNTER FRAME (separate box) */
    .view-counter {
      display: flex;
      align-items: center;
      gap: 8px;

      padding: 6px 10px;
      border-radius: 14px;

      background: rgba(0,0,0,0.15);
      border: 1px solid rgba(255, 170, 210, 0.45);

      box-shadow:
        0 0 10px rgba(0,0,0,0.4),
        0 0 14px rgba(255, 170, 210, 0.12);

      backdrop-filter: blur(10px);

      font-size: 0.85rem;
      color: rgba(255,255,255,0.75);
    }

    /* 🔷 MAIN CARD FRAME (center) */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;

      padding: 24px 36px;
      border-radius: 38px;

      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255, 170, 210, 0.55);

      box-shadow:
        0 0 18px rgba(0,0,0,0.45),
        0 0 18px rgba(255, 170, 210, 0.18);

      backdrop-filter: blur(16px);

      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    /* PFP */
    .pfp-wrap {
      position: relative;
      width: 95px;
      height: 95px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pfp-wrap::after {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: 50%;
      border: 1px solid rgba(255, 170, 210, 0.55);
      box-shadow: 0 0 14px rgba(255, 170, 210, 0.25);
      animation: ringSpin 10s linear infinite;
    }

    @keyframes ringSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .profile-pic {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      object-fit: cover;
    }

    /* 🔷 VOLUME FRAME (separate bottom box) */
    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 6px;

      padding: 6px 10px;
      border-radius: 14px;

      background: rgba(0,0,0,0.15);
      border: 1px solid rgba(255, 170, 210, 0.45);

      box-shadow:
        0 0 10px rgba(0,0,0,0.4),
        0 0 12px rgba(255, 170, 210, 0.12);

      backdrop-filter: blur(10px);
    }

    input[type="range"] {
      width: 70px;
      height: 2px;
      appearance: none;
      background: rgba(255, 170, 210, 0.4);
      border-radius: 999px;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffd1e8;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    .name {
      font-size: 2rem;
      font-weight: 900;
    }

    .cursor { animation: blink 1s infinite; }

    @keyframes blink {
      0%,100%{opacity:1;}
      50%{opacity:0;}
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="fog"></div>

<div class="rain-side left" id="leftRain"></div>
<div class="rain-side right" id="rightRain"></div>

<div class="intro" onclick="enterSite()">click to enter &lt;3</div>

<audio id="rain" src="rain.mp3" loop></audio>

<div id="content">

  <!-- COUNTER FRAME -->
  <div class="view-counter">
    <img src="viewcounter.png">
    <span>[DISABLED]</span>
  </div>

  <!-- MAIN FRAME -->
  <div class="card">

    <div class="name">Angel</div>
    <span class="cursor">|</span>

  </div>

  <!-- VOLUME FRAME -->
  <div class="volume-wrap hidden" id="volume">
    <img src="https://cdn-icons-png.flaticon.com/512/727/727269.png">
    <input type="range" min="0" max="1" step="0.01" value="0.05" oninput="setVolume(this.value)">
  </div>

</div>

<script>
const rain = document.getElementById("rain");
const volumeUI = document.getElementById("volume");

function setVolume(v) {
  rain.volume = v;
}

/* RAIN */
function spawnRain(container) {
  for (let i = 0; i < 25; i++) {
    const drop = document.createElement("div");
    drop.className = "drop";
    drop.style.left = Math.random() * 100 + "px";
    drop.style.animationDuration = (0.8 + Math.random() * 1.2) + "s";
    container.appendChild(drop);
  }
}

spawnRain(document.getElementById("leftRain"));
spawnRain(document.getElementById("rightRain"));

/* TITLE */
const titleText = "Nighty's Bio";
let ti = 0;

function animateTitle() {
  if (ti <= titleText.length) {
    document.title = titleText.substring(0, ti) + " |";
    ti++;
    setTimeout(animateTitle, 900);
  }
}

function enterSite() {
  document.querySelector(".intro").classList.add("fade-out");
  document.getElementById("content").classList.add("visible");

  volumeUI.classList.remove("hidden");

  rain.volume = 0.05;
  rain.play();

  setTimeout(() => {
    document.querySelector(".intro").style.display = "none";
  }, 1200);

  animateTitle();
}
</script>

</body>
</html>
