<!DOCTYPE html>
<html>
<head>
  <title id="title">n</title>

  <link rel="icon" href="icon.png" type="image/png">

  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Source Sans 3', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }

    /* BACKGROUND */
    .bg {
      position: fixed;
      inset: 0;
      background: url("background1.gif") center/cover no-repeat;
      filter: blur(6px) brightness(0.6);
      transform: scale(1.05);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: -1;
    }

    /* INTRO */
    .intro {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
      font-size: 2rem;
      text-shadow: 0 0 10px white;
      transition: opacity 1.2s ease;
    }

    .intro.fade-out {
      opacity: 0;
    }

    /* CONTENT */
    #content {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(12px);
      transition: opacity 1.2s ease, filter 1.2s ease, transform 1.2s ease;
    }

    #content.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    /* PROFILE IMAGE (no frame now) */
    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      box-shadow: 0 0 20px rgba(255,255,255,0.6);
    }

    /* NAME (no frame now) */
    .name {
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    /* BUTTON FRAME (ONLY ONE LEFT) */
    .button-frame {
      padding: 6px 18px; /* thinner vertically */
      border: 1px solid rgba(255,255,255,0.25); /* lighter border */
      background: rgba(0,0,0,0.15); /* more transparent */
      border-radius: 14px;
      backdrop-filter: blur(6px);
    }

    /* ROBLOX */
    .roblox img {
      width: 42px;
      transition: 0.25s ease;
      filter: drop-shadow(0 0 6px white);
    }

    .roblox img:hover {
      transform: scale(1.2);
    }

  </style>
</head>

<body>

  <!-- BACKGROUND -->
  <div class="bg"></div>
  <div class="overlay"></div>

  <!-- INTRO -->
  <div class="intro" onclick="enterSite()">click to enter</div>

  <!-- CONTENT -->
  <div id="content">

    <img src="pfp.png" class="profile-pic">

    <div class="name">Angel</div>

    <!-- ONLY FRAME LEFT -->
    <div class="button-frame">
      <div class="roblox">
        <a href="https://www.roblox.com/users/348101/profile" target="_blank">
          <img src="robloxbutton.png" alt="Roblox">
        </a>
      </div>
    </div>

  </div>

  <script>
    function enterSite() {
      const intro = document.querySelector(".intro");
      const content = document.getElementById("content");

      intro.classList.add("fade-out");
      content.classList.add("visible");

      setTimeout(() => {
        intro.style.display = "none";
      }, 1200);
    }

    // TITLE TYPE (0.5s per character)
    const fullText = "nighty.wtf";
    let i = 0;

    function typeTitle() {
      document.title = fullText.substring(0, i);
      i++;

      if (i <= fullText.length) {
        setTimeout(typeTitle, 500);
      }
    }

    typeTitle();
  </script>

</body>
</html>
