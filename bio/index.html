<!DOCTYPE html>
<html>
<head>
  <title></title>

  <link rel="icon" href="assets/icon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Source Sans 3', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    /* BACKGROUND */
    .bg {
      position: fixed;
      inset: 0;
      background: url("assets/background1.gif") center/cover no-repeat;
      filter: blur(6px) brightness(0.55);
      transform: scale(1.05);
      z-index: -4;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: -3;
    }

    /* FOG */
    .fog {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;

      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.06), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05), transparent 45%),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.04), transparent 50%);

      filter: blur(40px);
      opacity: 0.9;
      animation: fogDrift 20s ease-in-out infinite;
    }

    @keyframes fogDrift {
      0% { transform: translate(0px, 0px); }
      50% { transform: translate(-40px, 20px); }
      100% { transform: translate(0px, 0px); }
    }

    /* RAIN */
    .rain-side {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 120px;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .left { left: 0; }
    .right { right: 0; }

    .drop {
      position: absolute;
      width: 2px;
      height: 14px;
      background: rgba(255,255,255,0.6);
      opacity: 0.6;
      animation: fall linear infinite;
      border-radius: 999px;
    }

    @keyframes fall {
      0% { transform: translateY(-20px); opacity: 0; }
      10% { opacity: 0.7; }
      100% { transform: translateY(110vh); opacity: 0; }
    }

    /* INTRO */
    .intro {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
      font-size: 1.4rem;
      color: rgba(255,255,255,0.75);
      transition: opacity 1.2s ease;
    }

    .intro.fade-out { opacity: 0; }

    /* MAIN */
    #content {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(10px);
      transition: 1.2s ease;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #content.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    /* CARD */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;

      padding: 24px 36px;
      border-radius: 38px;

      background: rgba(0,0,0,0.12);
      border: 1px solid rgba(255, 170, 210, 0.50);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18),
        0 0 16px rgba(255,255,255,0.10),
        0 0 18px rgba(255, 170, 210, 0.10);

      backdrop-filter: blur(14px);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    /* PFP */
    .pfp-wrap {
      position: relative;
      width: 95px;
      height: 95px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pfp-wrap::after {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: 50%;
      border: 1px solid rgba(255, 170, 210, 0.55);
      box-shadow: 0 0 14px rgba(255,255,255,0.10);
    }

    .profile-pic {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .name {
      font-size: 2rem;
      font-weight: 900;
    }

    .cursor { animation: blink 1s infinite; }

    @keyframes blink {
      0%,100%{opacity:1;}
      50%{opacity:0;}
    }

    /* BUTTONS (FIXED SIZE) */
    .links {
      display: flex;
      gap: 10px;
    }

    .links img {
      width: 34px;   /* FIXED (was inconsistent before) */
      height: 34px;
      padding: 3px;
      border-radius: 10px;
      border: 1px solid rgba(255, 170, 210, 0.45);
      transition: 0.2s;
    }

    .links img:hover {
      transform: scale(1.12);
    }

    /* VOLUME */
    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 22px;
      padding: 6px 10px;
      border-radius: 14px;
      background: rgba(0,0,0,0.10);
      border: 1px solid rgba(255, 170, 210, 0.45);
      backdrop-filter: blur(12px);
    }

    input[type="range"] {
      width: 70px;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="fog"></div>

<div class="rain-side left" id="leftRain"></div>
<div class="rain-side right" id="rightRain"></div>

<div class="intro" onclick="enterSite()">click to enter &lt;3</div>

<audio id="rain" src="sounds/rain.mp3" loop></audio>

<div id="content">

  <div class="card">

    <div class="profile-row">
      <div class="pfp-wrap">
        <img src="assets/pfp.png" class="profile-pic">
      </div>

      <div>
        <div style="display:flex; align-items:center; gap:10px;">
          <div id="typedName" class="name"></div>
          <span class="cursor">|</span>
        </div>
        <div style="opacity:0.7;">.nighty_</div>
      </div>
    </div>

    <div class="links">
      <a href="#"><img src="assets/robloxbutton.png"></a>
      <a href="#"><img src="assets/discordbutton.png"></a>
    </div>

  </div>
</div>

<script>
const rain = document.getElementById("rain");

/* NAME TYPE (REVERSE + BLINK CURSOR FIXED) */
const nameText = "Nighty's bio";
let i = 0;
let forward = true;

function animateTitle() {
  let display = nameText.substring(0, i);
  document.title = display + " |";

  if (forward) {
    i++;
    if (i > nameText.length) {
      forward = false;
      setTimeout(animateTitle, 900);
      return;
    }
  } else {
    i--;
    if (i < 0) {
      forward = true;
      i = 0;
    }
  }

  setTimeout(animateTitle, 220);
}

/* NAME UNDER PFP */
let ni = 0;
function animateName() {
  const el = document.getElementById("typedName");
  el.textContent = nameText.substring(0, ni);
  ni = (ni + 1) % (nameText.length + 1);
  setTimeout(animateName, 200);
}

/* RAIN */
function spawnRain(container) {
  for (let i = 0; i < 25; i++) {
    const d = document.createElement("div");
    d.className = "drop";
    d.style.left = Math.random() * 100 + "px";
    d.style.animationDuration = (0.8 + Math.random()) + "s";
    container.appendChild(d);
  }
}

spawnRain(leftRain);
spawnRain(rightRain);

function enterSite() {
  document.querySelector(".intro").classList.add("fade-out");
  document.getElementById("content").classList.add("visible");

  rain.volume = 0.05;
  rain.play();

  setTimeout(() => {
    document.querySelector(".intro").style.display = "none";
  }, 1200);

  animateTitle();
  animateName();
}
</script>

</body>
</html>
