<!DOCTYPE html>
<html>
<head>
  <title id="title">n</title>

  <link rel="icon" href="icon.png" type="image/png">

  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Source Sans 3', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }

    /* BACKGROUND */
    .bg {
      position: fixed;
      inset: 0;
      background: url("background1.gif") center/cover no-repeat;
      filter: blur(6px) brightness(0.6);
      transform: scale(1.05);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: -1;
    }

    /* INTRO */
    .intro {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
      font-size: 2rem;
      text-shadow: 0 0 10px white;
      transition: opacity 1.2s ease;
    }

    .intro.fade-out {
      opacity: 0;
    }

    /* CONTENT */
    #content {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(12px);
      transition: opacity 1.2s ease, filter 1.2s ease, transform 1.2s ease;
    }

    #content.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    /* PROFILE */
    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(255,255,255,0.35);
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    /* NAME + GLOW */
    .name-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 25px;
    }

    .name {
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: 1px;
      color: white;

      text-shadow:
        0 0 6px rgba(255,255,255,0.35),
        0 0 12px rgba(255,255,255,0.25),
        0 0 24px rgba(255,255,255,0.15);
    }

    /* BADGE */
    .badge img {
      width: 26px;
    }

    /* ROBLOX BUTTON */
    .roblox img {
      width: 42px;
      transition: 0.25s ease;
      filter: drop-shadow(0 0 6px white);
    }

    .roblox img:hover {
      transform: scale(1.2);
    }

    /* AUDIO BUTTON */
    .audio-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.25);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      border-radius: 10px;
      display: none;
    }

  </style>
</head>

<body>

  <!-- BACKGROUND -->
  <div class="bg"></div>
  <div class="overlay"></div>

  <!-- INTRO -->
  <div class="intro" onclick="enterSite()">click to enter</div>

  <!-- AUDIO -->
  <audio id="rain" src="rain.mp3" loop></audio>

  <!-- CONTENT -->
  <div id="content">

    <img src="pfp.png" class="profile-pic">

    <div class="name-row">
      <div class="name">Angel</div>
      <div class="badge">
        <img src="badge1.png">
      </div>
    </div>

    <div class="roblox">
      <a href="https://www.roblox.com/users/348101/profile" target="_blank">
        <img src="robloxbutton.png">
      </a>
    </div>

  </div>

  <!-- AUDIO BUTTON -->
  <button class="audio-btn" onclick="toggleAudio()">mute</button>

  <script>
    function enterSite() {
      const intro = document.querySelector(".intro");
      const content = document.getElementById("content");
      const rain = document.getElementById("rain");
      const btn = document.querySelector(".audio-btn");

      intro.classList.add("fade-out");
      content.classList.add("visible");

      // start rain (quiet)
      rain.volume = 0.2;
      rain.play();

      // show audio button
      btn.style.display = "block";

      setTimeout(() => {
        intro.style.display = "none";
      }, 1200);
    }

    function toggleAudio() {
      const rain = document.getElementById("rain");
      const btn = document.querySelector(".audio-btn");

      if (rain.paused) {
        rain.play();
        btn.innerText = "mute";
      } else {
        rain.pause();
        btn.innerText = "unmute";
      }
    }

    /* TITLE TYPE + REVERSE (1 letter per second) */
    const text = "nighty.wtf";
    let i = 0;
    let forward = true;

    function animateTitle() {
      if (forward) {
        i++;
        document.title = text.substring(0, i);

        if (i === text.length) {
          forward = false;
          setTimeout(animateTitle, 1000);
          return;
        }
      } else {
        i--;
        document.title = text.substring(0, i);

        if (i === 0) {
          forward = true;
        }
      }

      setTimeout(animateTitle, 1000);
    }

    animateTitle();
  </script>

</body>
</html>
