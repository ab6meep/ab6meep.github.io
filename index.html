<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html,
body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: "Segoe UI", sans-serif;
}

body {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Blurred background image */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("background.png") center center / cover no-repeat;
    filter: blur(12px);
    transform: scale(1.1);
    z-index: -2;
}

/* Dark overlay */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.15);
    z-index: -1;
}

.container {
    text-align: center;
    animation: fadeIn 1.5s ease;
}

.title {
    color: white;
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 800;
    letter-spacing: 4px;
    text-shadow:
        0 0 10px #fff,
        0 0 20px #fff,
        0 0 40px #fff,
        0 0 80px #fff,
        0 0 120px rgba(255,255,255,0.8);
    animation: glow 2s ease-in-out infinite alternate;
}

.heart {
    margin-top: 20px;
    color: white;
    font-size: clamp(2rem, 5vw, 4rem);
    text-shadow:
        0 0 10px #fff,
        0 0 20px #fff,
        0 0 40px #fff;
    animation: pulse 1.5s infinite ease-in-out;
}

@keyframes glow {
    from {
        text-shadow:
            0 0 10px #fff,
            0 0 20px #fff,
            0 0 40px #fff,
            0 0 80px #fff;
    }

    to {
        text-shadow:
            0 0 20px #fff,
            0 0 40px #fff,
            0 0 80px #fff,
            0 0 120px #fff,
            0 0 160px #fff;
    }
}

@keyframes pulse {
    0%,100% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.15);
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="title">COMING SOON</div>
    <div class="heart">&lt;3</div>
</div>

</body>
</html>
