<!DOCTYPE html>
<html>
<head>
  <title>@</title>

  <link rel="icon" href="icon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Source Sans 3', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url("background1.gif") center/cover no-repeat;
      filter: blur(6px) brightness(0.6);
      transform: scale(1.05);
      z-index: -2;
    }

    /* lighter overlay (more transparent background overall) */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.20);
      z-index: -1;
    }

    /* CLICK SCREEN */
    .intro {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);

      display: flex;
      align-items: center;
      justify-content: center;

      z-index: 50;
      cursor: pointer;

      font-size: 1.4rem;
      color: rgba(255,255,255,0.75);

      transition: opacity 1.2s ease;
    }

    .intro.fade-out { opacity: 0; }

    /* MAIN WRAPPER */
    #content {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(10px);
      transition: 1.2s ease;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #content.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    /* PROFILE CARD (now matches view counter) */
    .card {
      position: relative;
      overflow: hidden;

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;

      padding: 22px 34px;
      border-radius: 12px;

      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.15);

      backdrop-filter: blur(6px);

      box-shadow:
        0 0 25px rgba(0,0,0,0.25);

      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .profile-pic {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      object-fit: cover;
      animation: glowPulse 4s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% {
        box-shadow:
          0 0 20px rgba(255,255,255,0.6),
          0 0 40px rgba(255,255,255,0.3);
      }
      50% {
        box-shadow:
          0 0 30px rgba(255,255,255,0.8),
          0 0 60px rgba(255,255,255,0.4);
      }
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .name-line {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .name {
      font-size: 2rem;
      font-weight: 900;
    }

    .cursor { animation: blink 1s infinite; }

    @keyframes blink {
      0%,100%{opacity:1;}
      50%{opacity:0;}
    }

    .badge img { width: 20px; }

    .handle { color: rgba(255,255,255,0.75); }

    /* BUTTONS */
    .links {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .roblox img,
    .discord img {
      width: 30px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 7px;
      padding: 4px;
      transition: 0.2s;
    }

    .roblox img:hover,
    .discord img:hover {
      transform: scale(1.15);
    }

    /* DISCORD HOVER */
    .discord {
      position: relative;
      display: inline-block;
      z-index: 9999;
    }

    .discord::after {
      content: "discord .nighty_";
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;

      font-size: 0.7rem;
      color: rgba(255,255,255,0.9);

      background: rgba(0,0,0,0.45);
      padding: 3px 7px;
      border-radius: 6px;

      opacity: 0;
      pointer-events: none;
      transition: 0.2s ease;

      z-index: 99999;
    }

    .discord:hover::after {
      opacity: 1;
    }

    /* VIEW COUNTER (same style as card) */
    .view-counter {
      display: flex;
      align-items: center;
      gap: 8px;

      margin-top: 14px;

      padding: 6px 10px;
      border-radius: 12px;

      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.15);

      backdrop-filter: blur(6px);

      color: rgba(255,255,255,0.75);
      font-size: 0.85rem;
    }

    .view-counter img {
      width: 16px;
      height: 16px;
      opacity: 0.9;
    }

    .audio-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 8px 14px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      display: none;
      color: white;
      cursor: pointer;
      z-index: 30;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="intro" onclick="enterSite()">click to enter &lt;3</div>

<audio id="rain" src="rain.mp3" loop></audio>

<div id="content">

  <div class="card">

    <div class="profile-row">
      <img src="pfp.png" class="profile-pic">

      <div class="info">
        <div class="name-line">
          <div id="typedName" class="name"></div>
          <span class="cursor">|</span>
          <div class="badge">
            <img src="badge1.gif">
          </div>
        </div>

        <div class="handle">.nighty_</div>
      </div>
    </div>

    <div class="links">
      <div class="roblox">
        <a href="https://www.roblox.com/users/348101/profile" target="_blank">
          <img src="robloxbutton.png">
        </a>
      </div>

      <div class="discord">
        <a href="#" target="_blank">
          <img src="discordbutton.png">
        </a>
      </div>
    </div>

  </div>

  <div class="view-counter">
    <img src="viewcounter.png">
    <span>[DISABLED]</span>
  </div>

</div>

<button class="audio-btn" onclick="toggleAudio()">mute</button>

<script>
function enterSite() {
  const intro = document.querySelector(".intro");
  const content = document.getElementById("content");
  const rain = document.getElementById("rain");
  const btn = document.querySelector(".audio-btn");

  intro.classList.add("fade-out");
  content.classList.add("visible");

  rain.volume = 0;
  rain.play();

  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 0.2) {
      vol += 0.02;
      rain.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 100);

  btn.style.display = "block";

  setTimeout(() => {
    intro.style.display = "none";
  }, 1200);

  animateName();
}

function toggleAudio() {
  const rain = document.getElementById("rain");
  const btn = document.querySelector(".audio-btn");

  if (rain.paused) {
    rain.play();
    btn.innerText = "mute";
  } else {
    rain.pause();
    btn.innerText = "unmute";
  }
}

/* TITLE */
const text = "@Nighty.wtf";
let i = 1;
let forward = true;

function animateTitle() {
  if (forward) {
    i++;
    document.title = text.substring(0, i);

    if (i === text.length) {
      forward = false;
      setTimeout(animateTitle, 1000);
      return;
    }
  } else {
    i--;
    document.title = text.substring(0, i);

    if (i === 1) {
      forward = true;
      setTimeout(animateTitle, 1000);
      return;
    }
  }

  setTimeout(animateTitle, 1000);
}
animateTitle();

/* TYPEWRITER */
const nameText = "Angel";
let ni = 0;
let nForward = true;

function animateName() {
  const el = document.getElementById("typedName");

  if (nForward) {
    ni++;
    el.textContent = nameText.substring(0, ni);

    if (ni === nameText.length) {
      nForward = false;
      setTimeout(animateName, 1200);
      return;
    }
  } else {
    ni--;
    el.textContent = nameText.substring(0, ni);

    if (ni === 1) {
      nForward = true;
      setTimeout(animateName, 900);
      return;
    }
  }

  setTimeout(animateName, 220);
}
</script>

</body>
</html>
