<!DOCTYPE html>
<html>
<head>
  <title>@</title>

  <link rel="icon" href="icon.png" type="image/png">

  <!-- FONT (normal weight) -->
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Source Sans 3', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: left;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url("background1.gif") center/cover no-repeat;
      filter: blur(6px) brightness(0.55);
      transform: scale(1.05);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: -1;
    }

    .intro {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
      font-size: 2rem;
      font-weight: 400;
      text-shadow: 0 0 10px white;
      transition: opacity 1.2s ease;
    }

    .intro.fade-out {
      opacity: 0;
    }

    #content {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(10px);
      transition: opacity 1.2s ease, filter 1.2s ease, transform 1.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    #content.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* UPDATED PFP */
    .profile-pic {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      object-fit: cover;

      border: 2px solid rgba(255,255,255,0.85);

      box-shadow:
        0 0 20px rgba(255,255,255,0.9),
        0 0 40px rgba(255,255,255,0.7),
        0 0 70px rgba(255,255,255,0.45),
        0 0 110px rgba(255,255,255,0.25);

      transition: 0.3s ease;
    }

    .profile-pic:hover {
      box-shadow:
        0 0 25px rgba(255,255,255,1),
        0 0 55px rgba(255,255,255,0.85),
        0 0 95px rgba(255,255,255,0.6),
        0 0 140px rgba(255,255,255,0.35);
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .name-line {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .name {
      font-size: 2rem;
      font-weight: 900;
      text-shadow:
        0 0 6px rgba(255,255,255,0.35),
        0 0 12px rgba(255,255,255,0.25);
    }

    .badge img {
      width: 20px;
      filter: drop-shadow(0 0 5px rgba(255,255,255,0.25));
    }

    .handle {
      font-size: 1rem;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.3px;
    }

    .roblox img {
      width: 38px;
      filter: drop-shadow(0 0 6px white);
      transition: 0.2s ease;
    }

    .roblox img:hover {
      transform: scale(1.15);
    }

    .audio-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.25);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="intro" onclick="enterSite()">click to enter &lt;3</div>

  <audio id="rain" src="rain.mp3" loop></audio>

  <div id="content">

    <div class="profile-row">

      <img src="pfp.png" class="profile-pic">

      <div class="info">

        <div class="name-line">
          <div class="name">Angel</div>
          <div class="badge">
            <img src="badge1.gif">
          </div>
        </div>

        <div class="handle">.nighty_</div>

      </div>

    </div>

    <div class="roblox">
      <a href="https://www.roblox.com/users/348101/profile" target="_blank">
        <img src="robloxbutton.png">
      </a>
    </div>

  </div>

  <button class="audio-btn" onclick="toggleAudio()">mute</button>

  <script>
    function enterSite() {
      const intro = document.querySelector(".intro");
      const content = document.getElementById("content");
      const rain = document.getElementById("rain");
      const btn = document.querySelector(".audio-btn");

      intro.classList.add("fade-out");
      content.classList.add("visible");

      rain.volume = 0.2;
      rain.play();

      btn.style.display = "block";

      setTimeout(() => {
        intro.style.display = "none";
      }, 1200);
    }

    function toggleAudio() {
      const rain = document.getElementById("rain");
      const btn = document.querySelector(".audio-btn");

      if (rain.paused) {
        rain.play();
        btn.innerText = "mute";
      } else {
        rain.pause();
        btn.innerText = "unmute";
      }
    }

    /* TITLE ANIMATION (1s per letter) */
    const text = "@Nighty.wtf";
    let i = 1;
    let forward = true;

    function animateTitle() {
      if (forward) {
        i++;
        document.title = text.substring(0, i);

        if (i === text.length) {
          forward = false;
          setTimeout(animateTitle, 1000);
          return;
        }
      } else {
        i--;
        document.title = text.substring(0, i);

        if (i === 1) {
          forward = true;
          setTimeout(animateTitle, 1000);
          return;
        }
      }

      setTimeout(animateTitle, 1000);
    }

    animateTitle();
  </script>

</body>
</html>
