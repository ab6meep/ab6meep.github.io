<!DOCTYPE html>
<html>
<head>
  <title>@</title>

  <link rel="icon" href="icon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Source Sans 3', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    /* BACKGROUND */
    .bg {
      position: fixed;
      inset: 0;
      background: url("background1.gif") center/cover no-repeat;
      filter: blur(6px) brightness(0.55);
      transform: scale(1.05);
      z-index: -3;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: -2;
    }

    /* FOG */
    .fog {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;

      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.06), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05), transparent 45%),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.04), transparent 50%);

      filter: blur(40px);
      opacity: 0.9;

      animation: fogDrift 20s ease-in-out infinite;
    }

    @keyframes fogDrift {
      0% { transform: translate(0px, 0px); }
      50% { transform: translate(-40px, 20px); }
      100% { transform: translate(0px, 0px); }
    }

    /* INTRO */
    .intro {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);

      display: flex;
      align-items: center;
      justify-content: center;

      z-index: 100;

      cursor: pointer;
      font-size: 1.4rem;
      color: rgba(255,255,255,0.75);

      transition: opacity 1.2s ease;
    }

    .intro.fade-out { opacity: 0; }

    /* MAIN */
    #content {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(10px);
      transition: 1.2s ease;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #content.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    /* VOLUME */
    .volume-wrap {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);

      display: flex;
      align-items: center;
      gap: 6px;

      padding: 4px 8px;
      border-radius: 10px;

      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255, 170, 210, 0.45);

      backdrop-filter: blur(6px);

      z-index: 80;
    }

    .volume-wrap img {
      width: 12px;
      height: 12px;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }

    input[type="range"] {
      width: 70px;
      height: 2px;

      appearance: none;
      background: rgba(255, 170, 210, 0.4);
      border-radius: 999px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffd1e8;
    }

    input[type="range"]::-moz-range-thumb {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffd1e8;
      border: none;
    }

    /* CARD (more circular + unified pink outline) */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;

      padding: 24px 36px;
      border-radius: 34px;

      background: rgba(0,0,0,0.28);

      border: 1px solid rgba(255, 170, 210, 0.45);

      backdrop-filter: blur(6px);

      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    /* PFP WRAPPER + PINK RING */
    .pfp-wrap {
      position: relative;
      width: 95px;
      height: 95px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pfp-wrap::after {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;

      border: 1px solid rgba(255, 170, 210, 0.55);

      box-shadow:
        0 0 10px rgba(255, 170, 210, 0.25),
        0 0 22px rgba(255, 170, 210, 0.18),
        inset 0 0 10px rgba(255, 170, 210, 0.12);

      animation: ringSpin 10s linear infinite;
    }

    @keyframes ringSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .profile-pic {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      object-fit: cover;

      animation: glowPulse 4s ease-in-out infinite;
    }

    /* softer pink glow */
    @keyframes glowPulse {
      0%, 100% {
        box-shadow:
          0 0 16px rgba(255, 170, 210, 0.25),
          0 0 30px rgba(255, 170, 210, 0.18);
      }
      50% {
        box-shadow:
          0 0 26px rgba(255, 170, 210, 0.35),
          0 0 55px rgba(255, 170, 210, 0.22);
      }
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .name-line {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .name {
      font-size: 2rem;
      font-weight: 900;
    }

    .cursor { animation: blink 1s infinite; }

    @keyframes blink {
      0%,100%{opacity:1;}
      50%{opacity:0;}
    }

    .badge img { width: 20px; }

    .handle { color: rgba(255,255,255,0.75); }

    /* BUTTONS */
    .links {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .roblox img,
    .discord img {
      width: 30px;
      border: 1px solid rgba(255, 170, 210, 0.45);
      border-radius: 10px;
      padding: 4px;
      transition: 0.2s;
    }

    .roblox img:hover,
    .discord img:hover {
      transform: scale(1.15);
    }

    .discord {
      position: relative;
      display: inline-block;
      z-index: 9999;
    }

    .discord::after {
      content: "discord .nighty_";
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;

      font-size: 0.7rem;
      color: rgba(255,255,255,0.9);

      background: rgba(0,0,0,0.45);
      padding: 3px 7px;
      border-radius: 6px;

      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
    }

    .discord:hover::after {
      opacity: 1;
    }

    /* VIEW COUNTER (same pink outline) */
    .view-counter {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;

      padding: 6px 10px;
      border-radius: 12px;

      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255, 170, 210, 0.45);

      color: rgba(255,255,255,0.75);
      font-size: 0.85rem;
      backdrop-filter: blur(6px);
    }

    .view-counter img {
      width: 16px;
      height: 16px;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="fog"></div>

<div class="intro" onclick="enterSite()">click to enter &lt;3</div>

<audio id="rain" src="rain.mp3" loop></audio>

<div class="volume-wrap hidden" id="volume">
  <img src="https://cdn-icons-png.flaticon.com/512/727/727269.png">
  <input type="range" min="0" max="1" step="0.01" value="0.05" oninput="setVolume(this.value)">
</div>

<div id="content">

  <div class="card">

    <div class="profile-row">
      <div class="pfp-wrap">
        <img src="pfp.png" class="profile-pic">
      </div>

      <div class="info">
        <div class="name-line">
          <div id="typedName" class="name"></div>
          <span class="cursor">|</span>
          <div class="badge">
            <img src="badge1.gif">
          </div>
        </div>

        <div class="handle">.nighty_</div>
      </div>
    </div>

    <div class="links">
      <div class="roblox">
        <a href="https://www.roblox.com/users/348101/profile" target="_blank">
          <img src="robloxbutton.png">
        </a>
      </div>

      <div class="discord">
        <a href="#" target="_blank">
          <img src="discordbutton.png">
        </a>
      </div>
    </div>

  </div>

  <div class="view-counter">
    <img src="viewcounter.png">
    <span>[DISABLED]</span>
  </div>

</div>

<script>
const rain = document.getElementById("rain");
const volumeUI = document.getElementById("volume");

function setVolume(v) {
  rain.volume = v;
}

function enterSite() {
  document.querySelector(".intro").classList.add("fade-out");
  document.getElementById("content").classList.add("visible");

  volumeUI.classList.remove("hidden");

  rain.volume = 0.05; // 🔊 slightly louder than before
  rain.play();

  setTimeout(() => {
    document.querySelector(".intro").style.display = "none";
  }, 1200);

  animateName();
}

/* TYPEWRITER */
const nameText = "Angel";
let ni = 0;
let nForward = true;

function animateName() {
  const el = document.getElementById("typedName");

  if (nForward) {
    ni++;
    el.textContent = nameText.substring(0, ni);

    if (ni === nameText.length) {
      nForward = false;
      setTimeout(animateName, 1200);
      return;
    }
  } else {
    ni--;
    el.textContent = nameText.substring(0, ni);

    if (ni === 1) {
      nForward = true;
      setTimeout(animateName, 900);
      return;
    }
  }

  setTimeout(animateName, 220);
}
</script>

</body>
</html>
