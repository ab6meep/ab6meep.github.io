<!DOCTYPE html>
<html>
<head>
  <title>@</title>

  <link rel="icon" href="assets/icon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Source Sans 3', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url("assets/background1.gif") center/cover no-repeat;
      filter: blur(6px) brightness(0.55);
      transform: scale(1.05);
      z-index: -4;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: -3;
    }

    .fog {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.06), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05), transparent 45%),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.04), transparent 50%);
      filter: blur(40px);
      opacity: 0.9;
      animation: fogDrift 20s ease-in-out infinite;
    }

    @keyframes fogDrift {
      0% { transform: translate(0px, 0px); }
      50% { transform: translate(-40px, 20px); }
      100% { transform: translate(0px, 0px); }
    }

    .rain-side {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 120px;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .left { left: 0; }
    .right { right: 0; }

    .drop {
      position: absolute;
      width: 2px;
      height: 14px;
      background: rgba(255,255,255,0.6);
      opacity: 0.6;
      animation: fall linear infinite;
      border-radius: 999px;
    }

    @keyframes fall {
      0% { transform: translateY(-20px); opacity: 0; }
      10% { opacity: 0.7; }
      100% { transform: translateY(110vh); opacity: 0; }
    }

    .intro {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
      font-size: 1.4rem;
      color: rgba(255,255,255,0.75);
      transition: opacity 1.2s ease;
    }

    .intro.fade-out { opacity: 0; }

    #content {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(10px);
      transition: 1.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #content.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    /* 🔥 VIEW COUNTER + PINK GLOW ADDED */
    .view-counter {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      padding: 6px 10px;
      border-radius: 16px;

      background: rgba(0,0,0,0.10);
      border: 1px solid rgba(255, 170, 210, 0.45);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.15),
        0 0 14px rgba(255,255,255,0.08),
        0 0 18px rgba(255, 170, 210, 0.18);

      backdrop-filter: blur(12px);
      font-size: 0.85rem;
      color: rgba(255,255,255,0.75);
    }

    .view-counter img {
      width: 16px;
      height: 16px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding: 24px 36px;
      border-radius: 38px;
      background: rgba(0,0,0,0.12);
      border: 1px solid rgba(255, 170, 210, 0.50);
      backdrop-filter: blur(14px);
      animation: float 6s ease-in-out infinite;

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.15),
        0 0 16px rgba(255,255,255,0.08),
        0 0 18px rgba(255, 170, 210, 0.12);
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .pfp-wrap {
      position: relative;
      width: 95px;
      height: 95px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pfp-wrap::after {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: 50%;
      border: 1px solid rgba(255, 170, 210, 0.55);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18),
        0 0 14px rgba(255,255,255,0.10),
        0 0 18px rgba(255, 170, 210, 0.25);

      animation: ringSpin 10s linear infinite;
    }

    @keyframes ringSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .profile-pic {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      object-fit: cover;
    }

    .name {
      font-size: 2rem;
      font-weight: 900;
    }

    .cursor { animation: blink 1s infinite; }

    @keyframes blink {
      0%,100%{opacity:1;}
      50%{opacity:0;}
    }

    .handle {
      color: rgba(255,255,255,0.75);
    }

    .links {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .roblox img,
    .discord img {
      width: 30px;
      border-radius: 10px;
      padding: 4px;
      border: 1px solid rgba(255, 170, 210, 0.45);
      transition: 0.2s;
    }

    .roblox img:hover,
    .discord img:hover {
      transform: scale(1.15);
    }

    .discord {
      position: relative;
    }

    .discord::after {
      content: ".nighty_";
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      background: rgba(0,0,0,0.45);
      padding: 3px 7px;
      border-radius: 6px;
      opacity: 0;
      transition: 0.2s;
      white-space: nowrap;
    }

    .discord:hover::after {
      opacity: 1;
    }

    /* 🔥 VOLUME + PINK GLOW ADDED */
    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 22px;
      padding: 6px 10px;
      border-radius: 14px;

      background: rgba(0,0,0,0.10);
      border: 1px solid rgba(255, 170, 210, 0.45);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.15),
        0 0 14px rgba(255,255,255,0.08),
        0 0 18px rgba(255, 170, 210, 0.18);

      backdrop-filter: blur(12px);
    }

    .volume-wrap img {
      width: 12px;
      height: 12px;
      filter: brightness(0) invert(1);
    }

    input[type="range"] {
      width: 70px;
      height: 2px;
      appearance: none;
      background: rgba(255, 170, 210, 0.4);
      border-radius: 999px;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffd1e8;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="fog"></div>

<div class="rain-side left" id="leftRain"></div>
<div class="rain-side right" id="rightRain"></div>

<div class="intro" onclick="enterSite()">click to enter <3</div>

<audio id="rain" src="sounds/rain.mp3" loop></audio>

<div id="content">

  <div class="view-counter">
    <img src="assets/viewcounter.png">
    <span>[DISABLED]</span>
  </div>

  <div class="card">

    <div class="profile-row">
      <div class="pfp-wrap">
        <img src="assets/pfp.png" class="profile-pic">
      </div>

      <div>
        <div class="name">Angel <span class="cursor">|</span></div>
        <div class="handle">.nighty_</div>
      </div>
    </div>

    <div class="links">
      <div class="roblox">
        <a href="https://www.roblox.com/users/348101/profile" target="_blank">
          <img src="assets/robloxbutton.png">
        </a>
      </div>

      <div class="discord">
        <img src="assets/discordbutton.png">
      </div>
    </div>

  </div>

  <div class="volume-wrap hidden" id="volume">
    <img src="https://cdn-icons-png.flaticon.com/512/727/727269.png">
    <input type="range" min="0" max="1" step="0.01" value="0.05" oninput="setVolume(this.value)">
  </div>

</div>

<script>
const rain = document.getElementById("rain");
const volumeUI = document.getElementById("volume");

function setVolume(v) {
  rain.volume = v;
}

function spawnRain(container) {
  for (let i = 0; i < 25; i++) {
    const drop = document.createElement("div");
    drop.className = "drop";
    drop.style.left = Math.random() * 100 + "px";
    drop.style.animationDuration = (0.8 + Math.random() * 1.2) + "s";
    container.appendChild(drop);
  }
}

spawnRain(document.getElementById("leftRain"));
spawnRain(document.getElementById("rightRain"));

function enterSite() {
  document.querySelector(".intro").classList.add("fade-out");
  document.getElementById("content").classList.add("visible");

  volumeUI.classList.remove("hidden");

  rain.volume = 0.05;
  rain.play();

  setTimeout(() => {
    document.querySelector(".intro").style.display = "none";
  }, 1200);
}
</script>

</body>
</html>
