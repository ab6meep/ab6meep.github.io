<!DOCTYPE html>
<html>
<head>
  <title>@</title>

  <link rel="icon" href="icon.png" type="image/png">

  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Source Sans 3', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url("background1.gif") center/cover no-repeat;
      filter: blur(6px) brightness(0.55);
      transform: scale(1.05);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: -1;
    }

    .intro {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
      font-size: 2rem;
      font-weight: 400;
      text-shadow: 0 0 10px white;
      transition: opacity 1.2s ease;
      border: 1px solid rgba(255,255,255,0.25);
    }

    .intro.fade-out {
      opacity: 0;
    }

    #content {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(10px);
      transition: 1.2s ease;
    }

    #content.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding: 22px 34px; /* slightly wider */
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 0 25px rgba(0,0,0,0.35),
        inset 0 0 20px rgba(255,255,255,0.04);
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 22px; /* more sideways spacing */
    }

    .profile-pic {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      object-fit: cover;

      /* REMOVED BORDER */

      box-shadow:
        0 0 20px rgba(255,255,255,0.9),
        0 0 40px rgba(255,255,255,0.7),
        0 0 70px rgba(255,255,255,0.45),
        0 0 110px rgba(255,255,255,0.25);

      transition: 0.3s ease;
    }

    .profile-pic:hover {
      box-shadow:
        0 0 25px rgba(255,255,255,1),
        0 0 55px rgba(255,255,255,0.85),
        0 0 95px rgba(255,255,255,0.6),
        0 0 140px rgba(255,255,255,0.35);
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .name-line {
      display: flex;
      align-items: center;
      gap: 10px; /* more spacing */
    }

    .name {
      font-size: 2rem;
      font-weight: 900;
    }

    .cursor {
      display: inline-block;
      margin-left: 3px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }

    .badge img {
      width: 20px;
      filter: drop-shadow(0 0 5px rgba(255,255,255,0.25));
    }

    .handle {
      font-size: 1rem;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.5px;
    }

    .roblox img {
      width: 38px;
      filter: drop-shadow(0 0 6px white);
      transition: 0.2s ease;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      padding: 5px;
    }

    .roblox img:hover {
      transform: scale(1.15);
    }

    .audio-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 8px 14px;
      background: rgba(0,0,0,0.25);
      color: white;
      border-radius: 10px;
      display: none;
      border: 1px solid rgba(255,255,255,0.25);
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="intro" onclick="enterSite()">click to enter &lt;3</div>

  <audio id="rain" src="rain.mp3" loop></audio>

  <div id="content">
    <div class="card">

      <div class="profile-row">
        <img src="pfp.png" class="profile-pic">

        <div class="info">
          <div class="name-line">
            <div class="name" id="typedName"></div>
            <span class="cursor">|</span>
            <div class="badge">
              <img src="badge1.gif">
            </div>
          </div>

          <div class="handle">.nighty_</div>
        </div>
      </div>

      <div class="roblox">
        <a href="https://www.roblox.com/users/348101/profile" target="_blank">
          <img src="robloxbutton.png">
        </a>
      </div>

    </div>
  </div>

  <button class="audio-btn" onclick="toggleAudio()">mute</button>

  <script>
    function enterSite() {
      const intro = document.querySelector(".intro");
      const content = document.getElementById("content");
      const rain = document.getElementById("rain");
      const btn = document.querySelector(".audio-btn");

      intro.classList.add("fade-out");
      content.classList.add("visible");

      rain.volume = 0.2;
      rain.play();

      btn.style.display = "block";

      setTimeout(() => {
        intro.style.display = "none";
      }, 1200);

      animateName();
    }

    function toggleAudio() {
      const rain = document.getElementById("rain");
      const btn = document.querySelector(".audio-btn");

      if (rain.paused) {
        rain.play();
        btn.innerText = "mute";
      } else {
        rain.pause();
        btn.innerText = "unmute";
      }
    }

    const text = "@Nighty.wtf";
    let i = 1;
    let forward = true;

    function animateTitle() {
      if (forward) {
        i++;
        document.title = text.substring(0, i);
        if (i === text.length) {
          forward = false;
          setTimeout(animateTitle, 1000);
          return;
        }
      } else {
        i--;
        document.title = text.substring(0, i);
        if (i === 1) {
          forward = true;
          setTimeout(animateTitle, 1000);
          return;
        }
      }
      setTimeout(animateTitle, 1000);
    }
    animateTitle();

    const nameText = "Angel";
    let ni = 0;
    let nForward = true;

    function animateName() {
      const el = document.getElementById("typedName");

      if (nForward) {
        ni++;
        el.textContent = nameText.substring(0, ni);

        if (ni === nameText.length) {
          nForward = false;
          setTimeout(animateName, 1200);
          return;
        }
      } else {
        ni--;
        el.textContent = nameText.substring(0, ni);

        if (ni === 0) {
          nForward = true;
          setTimeout(animateName, 800);
          return;
        }
      }

      setTimeout(animateName, 220);
    }
  </script>

</body>
</html>
