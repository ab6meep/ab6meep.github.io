<!DOCTYPE html>
<html>
<head>
  <title>Nighty's bio</title>

  <link rel="icon" href="/icon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Source Sans 3', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url("/background1.gif") center/cover no-repeat;
      filter: blur(6px) brightness(0.55);
      transform: scale(1.05);
      z-index: -4;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: -3;
    }

    .fog {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.06), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05), transparent 45%),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.04), transparent 50%);
      filter: blur(40px);
      opacity: 0.9;
      animation: fogDrift 20s ease-in-out infinite;
    }

    @keyframes fogDrift {
      0% { transform: translate(0px, 0px); }
      50% { transform: translate(-40px, 20px); }
      100% { transform: translate(0px, 0px); }
    }

    #content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding: 24px 36px;
      border-radius: 38px;
      background: rgba(0,0,0,0.12);
      border: 1px solid rgba(255, 170, 210, 0.50);
      backdrop-filter: blur(14px);
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .pfp-wrap {
      position: relative;
      width: 95px;
      height: 95px;
    }

    .pfp-wrap::after {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: 50%;
      border: 1px solid rgba(255, 170, 210, 0.55);
      animation: ringSpin 10s linear infinite;
    }

    @keyframes ringSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .profile-pic {
      width: 95px;
      height: 95px;
      border-radius: 50%;
    }

    .name {
      font-size: 2rem;
      font-weight: 900;
    }

    .cursor {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,100%{opacity:1;}
      50%{opacity:0;}
    }

    .links {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .links img {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(255, 170, 210, 0.45);
      transition: 0.2s;
    }

    .links img:hover {
      transform: scale(1.12);
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="fog"></div>

<div id="content">

  <div class="card">

    <div class="profile-row">

      <div class="pfp-wrap">
        <img src="/pfp.png" class="profile-pic">
      </div>

      <div>
        <div class="name">
          Angel <span class="cursor">|</span>
        </div>
        <div style="opacity:0.7">.nighty_</div>
      </div>

    </div>

    <div class="links">
      <a href="https://www.roblox.com/users/348101/profile">
        <img src="/robloxbutton.png">
      </a>

      <a href="#">
        <img src="/discordbutton.png">
      </a>
    </div>

  </div>

</div>

</body>
</html>
