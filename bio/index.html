<!DOCTYPE html>
<html>
<head>
  <title></title>

  <link rel="icon" href="assets/icon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Source Sans 3', Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

/* BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background: url("assets/background1.gif") center/cover no-repeat;
  filter: blur(6px) brightness(0.55);
  transform: scale(1.05);
  z-index: -4;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.82);
  z-index: -3;
}

/* FOG (same as old) */
.fog {
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.06), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05), transparent 45%),
    radial-gradient(circle at 40% 80%, rgba(255,255,255,0.04), transparent 50%);
  filter: blur(40px);
  opacity: 0.9;
}

/* CARD (restored old feel) */
.card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;

  padding: 24px 36px;
  border-radius: 38px;

  background: rgba(0,0,0,0.12);
  border: 1px solid rgba(255, 170, 210, 0.50);

  box-shadow:
    0 0 0 1px rgba(255,255,255,0.18),
    0 0 16px rgba(255,255,255,0.10),
    0 0 18px rgba(255, 170, 210, 0.10);

  backdrop-filter: blur(14px);
}

/* PFP (same as old) */
.pfp-wrap {
  position: relative;
  width: 95px;
  height: 95px;
}

.profile-pic {
  width: 95px;
  height: 95px;
  border-radius: 50%;
}

/* NAME */
.name {
  font-size: 2rem;
  font-weight: 900;
}

.cursor {
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,100%{opacity:1;}
  50%{opacity:0;}
}

/* BUTTONS FIXED (old sizing restored) */
.links {
  display: flex;
  gap: 8px;
  align-items: center;
}

.links img {
  width: 30px;
  height: 30px;
  padding: 4px;
  border-radius: 10px;
  border: 1px solid rgba(255, 170, 210, 0.45);
  transition: 0.2s;
}

.links img:hover {
  transform: scale(1.15);
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="fog"></div>

<audio id="rain" src="sounds/rain.mp3" loop></audio>

<div id="content">
  <div class="card">

    <div style="display:flex; align-items:center; gap:20px;">
      <img src="assets/pfp.png" class="profile-pic">

      <div>
        <div style="display:flex; align-items:center; gap:8px;">
          <div id="typedName" class="name"></div>
          <span class="cursor">|</span>
        </div>
        <div style="opacity:0.7;">.nighty_</div>
      </div>
    </div>

    <div class="links">
      <a href="#"><img src="assets/robloxbutton.png"></a>
      <a href="#"><img src="assets/discordbutton.png"></a>
    </div>

  </div>
</div>

<script>
/* ===== RAIN ===== */
const rain = document.getElementById("rain");
rain.volume = 0.05;

/* ===== TITLE TYPEWRITER (FIXED REVERSE LOOP) ===== */
const text = "Nighty's bio";
let i = 0;
let forward = true;

function animateTitle() {
  document.title = text.substring(0, i) + " |";

  if (forward) {
    i++;
    if (i > text.length) {
      forward = false;
      setTimeout(animateTitle, 800);
      return;
    }
  } else {
    i--;
    if (i < 0) {
      forward = true;
      i = 0;
    }
  }

  setTimeout(animateTitle, 180);
}

/* ===== NAME ANIMATION (simple clean loop) ===== */
let ni = 0;
function animateName() {
  document.getElementById("typedName").textContent =
    text.substring(0, ni);

  ni = (ni + 1) % (text.length + 1);
  setTimeout(animateName, 200);
}

/* START */
function enter() {
  rain.play();
  animateTitle();
  animateName();
}

enter();
</script>

</body>
</html>
