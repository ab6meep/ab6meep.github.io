<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><3</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ffd6e7;
        overflow: hidden;
    }

    .container {
        text-align: center;
    }

    h1 {
        color: white;
        font-size: clamp(3rem, 8vw, 7rem);
        font-weight: 700;
        text-transform: uppercase;
        text-shadow:
            0 0 10px #fff,
            0 0 20px #fff,
            0 0 40px #fff,
            0 0 60px #fff;
        animation: glow 2s ease-in-out infinite alternate;
    }

    .heart {
        font-size: clamp(4rem, 10vw, 8rem);
        color: white;
        margin-top: 20px;
        text-shadow:
            0 0 10px #fff,
            0 0 20px #fff,
            0 0 40px #fff;
        animation: pulse 1.5s infinite;
    }

    @keyframes glow {
        from {
            text-shadow:
                0 0 10px #fff,
                0 0 20px #fff,
                0 0 40px #fff;
        }
        to {
            text-shadow:
                0 0 20px #fff,
                0 0 40px #fff,
                0 0 80px #fff;
        }
    }

    @keyframes pulse {
        0%, 100% {
            transform: scale(1);
        }
        50% {
            transform: scale(1.15);
        }
    }
</style>
</head>
<body>

<div class="container">
    <h1>COMING SOON</h1>
    <div class="heart">♡</div>
</div>

</body>
</html>
