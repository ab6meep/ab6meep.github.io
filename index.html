<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>enter</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body, html {
      height: 100%;
      overflow: hidden;
    }

    /* Background */
    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") center/cover no-repeat;
      filter: blur(10px);
      transform: scale(1.1);
    }

    /* Overlay */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Enter text */
    .enter {
      color: white;
      font-size: 2rem;
      letter-spacing: 3px;
      cursor: pointer;
      transition: 0.3s;
    }

    .enter:hover {
      opacity: 0.7;
      transform: scale(1.1);
    }

    /* Fade out animation */
    .fade-out {
      animation: fadeOut 1s forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }
  </style>
</head>

<body>

  <div class="bg"></div>

  <div class="overlay" id="overlay">
    <div class="enter" onclick="enterSite()">CLICK TO ENTER</div>
  </div>

  <script>
    function enterSite() {
      document.getElementById("overlay").classList.add("fade-out");

      // redirect after fade (optional)
      setTimeout(() => {
        window.location.href = "home.html"; // change this if needed
      }, 1000);
    }
  </script>

</body>
</html>
