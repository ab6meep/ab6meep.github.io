<!DOCTYPE html>
<html>
<head>
  <title id="title">angel</title>

  <link rel="icon" href="icon.png" type="image/png">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    /* BLUR */
    #content {
      filter: blur(10px);
      transition: filter 0.8s ease, opacity 0.8s ease;
      opacity: 0.6;
    }

    #content.visible {
      filter: blur(0);
      opacity: 1;
    }

    /* INTRO */
    .intro {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
      font-size: 2rem;
      text-shadow: 0 0 10px white;
      animation: pulse 2s infinite;
      transition: opacity 0.8s ease;
    }

    .intro.fade-out {
      opacity: 0;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }

    /* BANNER */
    .banner {
      position: absolute;
      top: 0;
      width: 100%;
      height: 220px;
      background: url('banner.png') center/cover no-repeat;
      filter: brightness(0.5);
      z-index: -1;
    }

    /* PROFILE */
    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-top: 100px;
      margin-bottom: 20px;
      box-shadow: 0 0 20px #ffb6c1;
      border: 2px solid #ffb6c1;
    }

    .name {
      font-size: 2rem;
      color: #ffb6c1;
      text-shadow: 0 0 10px #ffb6c1;
      margin-bottom: 25px;
    }

    /* LINKS BOX */
    .links {
      padding: 20px 30px;
      border: 1px solid white;
      border-radius: 15px;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
      margin-top: 10px;
    }

    .roblox img {
      width: 30px;
      filter: drop-shadow(0 0 5px white);
      transition: 0.25s;
    }

    .roblox img:hover {
      transform: scale(1.25);
    }

  </style>
</head>

<body>

  <!-- INTRO -->
  <div class="intro" onclick="enterSite()">click to enter</div>

  <!-- MAIN -->
  <div id="content">
    
    <div class="banner"></div>

    <img src="pfp.png" class="profile-pic">
    
    <div class="name">Angel</div>

    <div class="links">
      <div class="roblox">
        <a href="https://www.roblox.com/users/348101/profile" target="_blank">
          <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.svg">
        </a>
      </div>
    </div>

  </div>

  <script>
    function enterSite() {
      const intro = document.querySelector(".intro");
      const content = document.getElementById("content");

      intro.classList.add("fade-out");
      content.classList.add("visible");

      setTimeout(() => {
        intro.style.display = "none";
      }, 800);
    }

    // TITLE ANIMATION
    const text = "angelangelangel";
    let i = 0;

    setInterval(() => {
      document.title = text.substring(0, i);
      i++;
      if (i > text.length) i = 0;
    }, 200);
  </script>

</body>
</html>
