<!DOCTYPE html>
<html>
<head>
  <title></title>

  <link rel="icon" href="icon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Source Sans 3', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url("background1.gif") center/cover no-repeat;
      filter: blur(6px) brightness(0.55);
      transform: scale(1.05);
      z-index: -4;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: -3;
    }

    .fog {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.06), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05), transparent 45%),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.04), transparent 50%);
      filter: blur(40px);
      opacity: 0.9;
      animation: fogDrift 20s ease-in-out infinite;
    }

    @keyframes fogDrift {
      0% { transform: translate(0px, 0px); }
      50% { transform: translate(-40px, 20px); }
      100% { transform: translate(0px, 0px); }
    }

    .rain-side {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 120px;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .left { left: 0; }
    .right { right: 0; }

    .drop {
      position: absolute;
      width: 2px;
      height: 14px;
      background: rgba(255,255,255,0.6);
      opacity: 0.6;
      animation: fall linear infinite;
      border-radius: 999px;
    }

    @keyframes fall {
      0% { transform: translateY(-20px); opacity: 0; }
      10% { opacity: 0.7; }
      100% { transform: translateY(110vh); opacity: 0; }
    }

    .intro {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
      font-size: 1.4rem;
      color: rgba(255,255,255,0.75);
      transition: opacity 1.2s ease;
    }

    .intro.fade-out { opacity: 0; }

    #content {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(10px);
      transition: 1.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #content.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding: 24px 36px;
      border-radius: 38px;
      background: rgba(0,0,0,0.12);
      border: 1px solid rgba(255, 170, 210, 0.50);
      backdrop-filter: blur(14px);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .pfp-wrap {
      position: relative;
      width: 95px;
      height: 95px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pfp-wrap::after {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: 50%;
      border: 1px solid rgba(255, 170, 210, 0.55);
      animation: ringSpin 10s linear infinite;
    }

    @keyframes ringSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .profile-pic {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .name {
      font-size: 2rem;
      font-weight: 900;
    }

    .cursor {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,100%{opacity:1;}
      50%{opacity:0;}
    }

    .links {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* 🔥 FIXED BUTTON SIZE */
    .roblox img,
    .discord img {
      width: 38px;   /* slightly bigger (was 30) */
      height: 38px;
      border-radius: 10px;
      padding: 4px;
      border: 1px solid rgba(255, 170, 210, 0.45);
      transition: 0.2s;
    }

    .roblox img:hover,
    .discord img:hover {
      transform: scale(1.12);
    }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 22px;
      padding: 6px 10px;
      border-radius: 14px;
      background: rgba(0,0,0,0.10);
      border: 1px solid rgba(255, 170, 210, 0.45);
      backdrop-filter: blur(12px);
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="fog"></div>

<div class="rain-side left" id="leftRain"></div>
<div class="rain-side right" id="rightRain"></div>

<div class="intro" onclick="enterSite()">click to enter &lt;3</div>

<audio id="rain" src="rain.mp3" loop></audio>

<div id="content">

  <div class="card">

    <div class="profile-row">
      <div class="pfp-wrap">
        <img src="pfp.png" class="profile-pic">
      </div>

      <div class="info">
        <div>
          <span id="typedName" class="name"></span>
          <span class="cursor">|</span>
        </div>

        <div class="handle">.nighty_</div>
      </div>
    </div>

    <div class="links">
      <a href="https://www.roblox.com/users/348101/profile" target="_blank">
        <img src="robloxbutton.png">
      </a>

      <a href="#">
        <img src="discordbutton.png">
      </a>
    </div>

  </div>

</div>

<script>
/* ---------------- AUDIO ---------------- */
const rain = document.getElementById("rain");

/* ---------------- RAIN ---------------- */
function spawnRain(container) {
  for (let i = 0; i < 25; i++) {
    const drop = document.createElement("div");
    drop.className = "drop";
    drop.style.left = Math.random() * 100 + "px";
    drop.style.animationDuration = (0.8 + Math.random() * 1.2) + "s";
    container.appendChild(drop);
  }
}
spawnRain(document.getElementById("leftRain"));
spawnRain(document.getElementById("rightRain"));

/* ---------------- ENTER ---------------- */
function enterSite() {
  document.querySelector(".intro").classList.add("fade-out");
  document.getElementById("content").classList.add("visible");

  rain.volume = 0.05;
  rain.play();

  setTimeout(() => {
    document.querySelector(".intro").style.display = "none";
  }, 1200);

  startTitleAnim();
}

/* ---------------- TITLE ANIMATION (FORWARD + REVERSE + CURSOR) ---------------- */
const baseTitle = "Nighty's bio";
let i = 0;
let forward = true;
let cursorOn = true;

function updateTitle() {
  let text = baseTitle.substring(0, i);
  document.title = text + (cursorOn ? "|" : "");
  cursorOn = !cursorOn;

  if (forward) {
    i++;
    if (i > baseTitle.length) {
      forward = false;
      setTimeout(updateTitle, 900);
      return;
    }
  } else {
    i--;
    if (i <= 0) {
      forward = true;
      setTimeout(updateTitle, 900);
      return;
    }
  }

  setTimeout(updateTitle, 900);
}

function startTitleAnim() {
  updateTitle();
}

/* ---------------- NAME TYPE ---------------- */
const nameText = "Angel";
let ni = 0;
let dir = 1;

function typeName() {
  const el = document.getElementById("typedName");

  ni += dir;
  el.textContent = nameText.substring(0, ni);

  if (ni === nameText.length) dir = -1;
  if (ni === 0) dir = 1;

  setTimeout(typeName, 180);
}
</script>

</body>
</html>
