<!DOCTYPE html>
<html>
<head>
  <title id="title">n</title>

  <link rel="icon" href="icon.png" type="image/png">

  <!-- Gotham-style fallback (use your own GothamBlack.ttf if you have it) -->
  <style>
    @font-face {
      font-family: "GothamBlack";
      src: url("GothamBlack.ttf");
    }

    body {
      margin: 0;
      background: black;
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    /* INTRO */
    .intro {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
      font-size: 2rem;
      text-shadow: 0 0 10px white;
      transition: opacity 1.2s ease;
    }

    .intro.fade-out {
      opacity: 0;
    }

    /* CONTENT */
    #content {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(12px);
      transition: opacity 1.2s ease, filter 1.2s ease, transform 1.2s ease;
    }

    #content.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    /* PROFILE */
    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 30px;
      box-shadow: 0 0 20px white;
    }

    /* ANGEL NAME (GOTHAM BLACK STYLE) */
    .name {
      font-family: "GothamBlack", Arial, sans-serif;
      font-size: 2.4rem;
      font-weight: 900;
      color: white;
      margin-bottom: 35px;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(255,255,255,0.25);
    }

    /* ROBLOX */
    .roblox img {
      width: 42px;
      transition: 0.25s ease;
      filter: drop-shadow(0 0 6px white);
    }

    .roblox img:hover {
      transform: scale(1.2);
    }

  </style>
</head>

<body>

  <!-- INTRO -->
  <div class="intro" onclick="enterSite()">click to enter</div>

  <!-- CONTENT -->
  <div id="content">

    <img src="pfp.png" class="profile-pic">

    <div class="name">Angel</div>

    <div class="roblox">
      <a href="https://www.roblox.com/users/348101/profile" target="_blank">
        <img src="robloxbutton.png" alt="Roblox">
      </a>
    </div>

  </div>

  <script>
    function enterSite() {
      const intro = document.querySelector(".intro");
      const content = document.getElementById("content");

      intro.classList.add("fade-out");
      content.classList.add("visible");

      setTimeout(() => {
        intro.style.display = "none";
      }, 1200);
    }

    // TITLE TYPE (0.5s per character EXACT)
    const fullText = "nighty.wtf";
    let i = 0;

    function typeTitle() {
      document.title = fullText.substring(0, i);
      i++;

      if (i <= fullText.length) {
        setTimeout(typeTitle, 500); // 0.5 seconds per character
      }
    }

    typeTitle();
  </script>

</body>
</html>
