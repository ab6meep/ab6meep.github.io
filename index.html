<!DOCTYPE html>
<html>
<head>
  <title id="title">angel</title>

  <link rel="icon" href="icon.png" type="image/png">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    /* INTRO SCREEN */
    .intro {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
      font-size: 2rem;
      text-shadow: 0 0 10px white;
      transition: opacity 1.2s ease;
    }

    .intro.fade-out {
      opacity: 0;
    }

    /* MAIN CONTENT (hidden at start) */
    #content {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(12px);
      transition: opacity 1.2s ease, filter 1.2s ease, transform 1.2s ease;
    }

    #content.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    /* PROFILE IMAGE */
    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 30px;
      box-shadow: 0 0 20px #ffb6c1;
    }

    /* NAME */
    .name {
      font-size: 2rem;
      color: #ffb6c1;
      text-shadow: 0 0 10px #ffb6c1;
      margin-bottom: 35px;
    }

    /* ROBLOX BUTTON */
    .roblox img {
      width: 42px;
      transition: 0.25s ease;
      filter: drop-shadow(0 0 6px white);
    }

    .roblox img:hover {
      transform: scale(1.2);
    }

  </style>
</head>

<body>

  <!-- CLICK TO ENTER -->
  <div class="intro" onclick="enterSite()">click to enter</div>

  <!-- CONTENT -->
  <div id="content">

    <img src="pfp.png" class="profile-pic">

    <div class="name">Angel</div>

    <div class="roblox">
      <a href="https://www.roblox.com/users/348101/profile" target="_blank">
        <img src="robloxbutton.png" alt="Roblox">
      </a>
    </div>

  </div>

  <script>
    function enterSite() {
      const intro = document.querySelector(".intro");
      const content = document.getElementById("content");

      intro.classList.add("fade-out");
      content.classList.add("visible");

      setTimeout(() => {
        intro.style.display = "none";
      }, 1200);
    }

    // Animated title
    const text = "angelangelangel";
    let i = 0;

    setInterval(() => {
      document.title = text.substring(0, i);
      i++;
      if (i > text.length) i = 0;
    }, 200);
  </script>

</body>
</html>
