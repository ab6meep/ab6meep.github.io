<!DOCTYPE html>
<html>
<head>
  <title></title>

  <link rel="icon" href="icon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Source Sans 3', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    /* BACKGROUND */
    .bg {
      position: fixed;
      inset: 0;
      background: url("background1.gif") center/cover no-repeat;
      filter: blur(6px) brightness(0.55);
      transform: scale(1.05);
      z-index: -4;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: -3;
    }

    /* FOG */
    .fog {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;

      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.06), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05), transparent 45%),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.04), transparent 50%);

      filter: blur(40px);
      opacity: 0.9;
      animation: fogDrift 20s ease-in-out infinite;
    }

    @keyframes fogDrift {
      0% { transform: translate(0px, 0px); }
      50% { transform: translate(-40px, 20px); }
      100% { transform: translate(0px, 0px); }
    }

    /* RAIN */
    .rain-side {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 120px;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .left { left: 0; }
    .right { right: 0; }

    .drop {
      position: absolute;
      width: 2px;
      height: 14px;
      background: rgba(255,255,255,0.6);
      opacity: 0.6;
      animation: fall linear infinite;
      border-radius: 999px;
    }

    @keyframes fall {
      0% { transform: translateY(-20px); opacity: 0; }
      10% { opacity: 0.7; }
      100% { transform: translateY(110vh); opacity: 0; }
    }

    /* INTRO */
    .intro {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
      font-size: 1.4rem;
      color: rgba(255,255,255,0.75);
      transition: opacity 1.2s ease;
    }

    .intro.fade-out { opacity: 0; }

    /* MAIN */
    #content {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(10px);
      transition: 1.2s ease;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #content.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    /* VIEW COUNTER */
    .view-counter {
      display: flex;
      align-items: center;
      gap: 8px;

      margin-bottom: 18px;
      padding: 6px 10px;
      border-radius: 16px;

      background: rgba(0,0,0,0.08);

      border: 1px solid rgba(255, 170, 210, 0.45);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.14),
        0 0 14px rgba(255,255,255,0.06);

      backdrop-filter: blur(12px);

      color: rgba(255,255,255,0.75);
      font-size: 0.85rem;
    }

    /* CARD */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;

      padding: 24px 36px;
      border-radius: 38px;

      background: rgba(0,0,0,0.10);

      border: 1px solid rgba(255, 170, 210, 0.50);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.14),
        0 0 16px rgba(255,255,255,0.08),
        0 0 18px rgba(255, 170, 210, 0.10);

      backdrop-filter: blur(14px);

      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    /* NAME */
    .name {
      font-size: 2rem;
      font-weight: 900;
    }

    .cursor { animation: blink 1s infinite; }

    @keyframes blink {
      0%,100%{opacity:1;}
      50%{opacity:0;}
    }

    .volume-wrap {
      margin-top: 22px;
      padding: 6px 10px;
      border-radius: 14px;

      background: rgba(0,0,0,0.08);

      border: 1px solid rgba(255, 170, 210, 0.45);

      backdrop-filter: blur(12px);
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="fog"></div>

<div class="rain-side left" id="leftRain"></div>
<div class="rain-side right" id="rightRain"></div>

<div class="intro" onclick="enterSite()">click to enter &lt;3</div>

<audio id="rain" src="rain.mp3" loop></audio>

<div id="content">

  <div class="view-counter">
    <img src="viewcounter.png">
    <span>[DISABLED]</span>
  </div>

  <div class="card">

    <div class="name" id="typedName"></div>
    <span class="cursor">|</span>

  </div>
</div>

<script>
const rain = document.getElementById("rain");

/* RAIN */
function spawnRain(container) {
  for (let i = 0; i < 25; i++) {
    const drop = document.createElement("div");
    drop.className = "drop";
    drop.style.left = Math.random() * 100 + "px";
    drop.style.animationDuration = (0.8 + Math.random() * 1.2) + "s";
    container.appendChild(drop);
  }
}

spawnRain(document.getElementById("leftRain"));
spawnRain(document.getElementById("rightRain"));

/* NAME */
const nameText = "Nighty";
let ni = 0;
let forward = true;

function animateName() {
  const el = document.getElementById("typedName");

  if (forward) {
    ni++;
    el.textContent = nameText.substring(0, ni);

    if (ni === nameText.length) {
      forward = false;
      setTimeout(animateName, 1200);
      return;
    }
  } else {
    ni--;
    el.textContent = nameText.substring(0, ni);

    if (ni === 1) {
      forward = true;
      setTimeout(animateName, 900);
      return;
    }
  }

  setTimeout(animateName, 220);
}

/* TITLE ANIMATION */
const titleText = "Nighty's Bio";
let ti = 0;
let tForward = true;

function animateTitle() {
  if (tForward) {
    ti++;
    document.title = titleText.substring(0, ti) + " |";

    if (ti === titleText.length) {
      tForward = false;
      setTimeout(animateTitle, 1200);
      return;
    }
  } else {
    ti--;
    document.title = titleText.substring(0, ti) + " |";

    if (ti === 1) {
      tForward = true;
      setTimeout(animateTitle, 800);
      return;
    }
  }

  setTimeout(animateTitle, 160);
}

function enterSite() {
  document.querySelector(".intro").classList.add("fade-out");
  document.getElementById("content").classList.add("visible");

  rain.volume = 0.05;
  rain.play();

  setTimeout(() => {
    document.querySelector(".intro").style.display = "none";
  }, 1200);

  animateName();
  animateTitle();
}
</script>

</body>
</html>
