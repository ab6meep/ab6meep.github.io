<!DOCTYPE html>
<html>
<head>
  <title></title>

  <link rel="icon" href="icon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Source Sans 3', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    /* BACKGROUND */
    .bg {
      position: fixed;
      inset: 0;
      background: url("background1.gif") center/cover no-repeat;
      filter: blur(6px) brightness(0.55);
      transform: scale(1.05);
      z-index: -4;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: -3;
    }

    .fog {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;

      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.06), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05), transparent 45%),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.04), transparent 50%);

      filter: blur(40px);
      opacity: 0.9;
      animation: fogDrift 20s ease-in-out infinite;
    }

    @keyframes fogDrift {
      0% { transform: translate(0px, 0px); }
      50% { transform: translate(-40px, 20px); }
      100% { transform: translate(0px, 0px); }
    }

    /* INTRO */
    .intro {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);

      display: flex;
      align-items: center;
      justify-content: center;

      z-index: 100;

      cursor: pointer;
      font-size: 1.3rem;
      color: rgba(255,255,255,0.75);

      transition: opacity 1.2s ease;
    }

    .intro.fade-out { opacity: 0; }

    /* MAIN */
    #content {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(10px);
      transition: 1.2s ease;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #content.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    /* VIEW COUNTER (slightly up) */
    .view-counter {
      margin-bottom: 18px;

      padding: 7px 12px;
      border-radius: 16px;

      background: rgba(0,0,0,0.10);

      border: 1px solid rgba(255, 170, 210, 0.45);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18),
        0 0 12px rgba(255,255,255,0.08);

      backdrop-filter: blur(12px);

      display: flex;
      align-items: center;
      gap: 8px;

      font-size: 0.9rem;
      color: rgba(255,255,255,0.75);
    }

    .view-counter img {
      width: 16px;
      height: 16px;
    }

    /* CARD (ONLY SLIGHTLY BIGGER, NOT BLOWN UP) */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;

      padding: 26px 38px; /* slightly reduced */
      border-radius: 38px;

      background: rgba(0,0,0,0.12);

      border: 1px solid rgba(255, 170, 210, 0.50);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18),
        0 0 16px rgba(255,255,255,0.10),
        0 0 18px rgba(255, 170, 210, 0.10);

      backdrop-filter: blur(14px);

      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    /* PFP */
    .pfp-wrap {
      position: relative;
      width: 102px; /* was larger before */
      height: 102px;
    }

    .pfp-wrap::after {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: 50%;

      border: 1px solid rgba(255, 170, 210, 0.55);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18),
        0 0 14px rgba(255,255,255,0.10),
        0 0 16px rgba(255, 170, 210, 0.20);

      animation: ringSpin 10s linear infinite;
    }

    @keyframes ringSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .profile-pic {
      width: 102px;
      height: 102px;
      border-radius: 50%;
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .name {
      font-size: 2.05rem;
      font-weight: 900;
    }

    .cursor { animation: blink 1s infinite; }

    @keyframes blink {
      0%,100%{opacity:1;}
      50%{opacity:0;}
    }

    .roblox img,
    .discord img {
      width: 32px;
      border-radius: 10px;
      padding: 4px;
      border: 1px solid rgba(255, 170, 210, 0.45);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18),
        0 0 10px rgba(255,255,255,0.08);
      transition: 0.2s;
    }

    .roblox img:hover,
    .discord img:hover {
      transform: scale(1.12);
    }

    /* VOLUME */
    .volume-wrap {
      margin-top: 20px;
      padding: 6px 10px;

      border-radius: 14px;
      background: rgba(0,0,0,0.10);

      border: 1px solid rgba(255, 170, 210, 0.45);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18),
        0 0 10px rgba(255,255,255,0.08);

      display: flex;
      align-items: center;
      gap: 6px;
    }

    .volume-wrap img {
      width: 12px;
      height: 12px;
      filter: brightness(0) invert(1);
    }

    input[type="range"] {
      width: 80px;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="fog"></div>

<div class="intro" onclick="enterSite()">click to enter &lt;3</div>

<audio id="rain" src="rain.mp3" loop></audio>

<div id="content">

  <div class="view-counter">
    <img src="viewcounter.png">
    <span>[DISABLED]</span>
  </div>

  <div class="card">

    <div class="profile-row">
      <div class="pfp-wrap">
        <img src="pfp.png" class="profile-pic">
      </div>

      <div>
        <div class="name" id="titleName"></div>
        <div style="opacity:0.75;">.nighty_</div>
      </div>
    </div>

    <div class="links">
      <a href="#"><img src="robloxbutton.png"></a>
      <a href="#"><img src="discordbutton.png"></a>
    </div>

  </div>

</div>

<script>
const rain = document.getElementById("rain");

function enterSite() {
  document.querySelector(".intro").classList.add("fade-out");
  document.getElementById("content").classList.add("visible");

  rain.volume = 0.05;
  rain.play();

  setTimeout(() => {
    document.querySelector(".intro").style.display = "none";
  }, 1200);

  titleLoop();
}

/* TITLE LOOP FIXED */
const text = "Nighty's Bio";
const el = document.getElementById("titleName");

let i = 0;
let deleting = false;

function titleLoop() {
  if (!deleting) {
    i++;
    el.textContent = text.substring(0, i) + "|";

    if (i === text.length) {
      deleting = true;
      setTimeout(titleLoop, 1200);
      return;
    }
  } else {
    i--;
    el.textContent = text.substring(0, i) + "|";

    if (i === 1) {
      deleting = false;
      setTimeout(titleLoop, 400);
      return;
    }
  }

  setTimeout(titleLoop, deleting ? 60 : 110);
}
</script>

</body>
</html>
