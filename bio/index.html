<!DOCTYPE html>
<html>
<head>
  <title>@</title>

  <link rel="icon" href="assets/icon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Source Sans 3', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url("assets/background1.gif") center/cover no-repeat;
      filter: blur(6px) brightness(0.55);
      transform: scale(1.05);
      z-index: -4;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: -3;
    }

    .fog {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;

      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.06), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05), transparent 45%),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.04), transparent 50%);

      filter: blur(40px);
      opacity: 0.9;
      animation: fogDrift 20s ease-in-out infinite;
    }

    @keyframes fogDrift {
      0% { transform: translate(0px, 0px); }
      50% { transform: translate(-40px, 20px); }
      100% { transform: translate(0px, 0px); }
    }

    .rain-side {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 120px;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .left { left: 0; }
    .right { right: 0; }

    .drop {
      position: absolute;
      width: 2px;
      height: 14px;
      background: rgba(255,255,255,0.6);
      opacity: 0.6;
      animation: fall linear infinite;
      border-radius: 999px;
    }

    @keyframes fall {
      0% { transform: translateY(-20px); opacity: 0; }
      10% { opacity: 0.7; }
      100% { transform: translateY(110vh); opacity: 0; }
    }

    .intro {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
      font-size: 1.4rem;
      color: rgba(255,255,255,0.75);
      transition: opacity 1.2s ease;
    }

    .intro.fade-out { opacity: 0; }

    #content {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(10px);
      transition: 1.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #content.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    /* VIEW COUNTER (RESTORED) */
    .view-counter {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      padding: 6px 10px;
      border-radius: 16px;
      background: rgba(0,0,0,0.10);
      border: 1px solid rgba(255, 170, 210, 0.45);
      backdrop-filter: blur(12px);
      font-size: 0.85rem;
      color: rgba(255,255,255,0.75);
    }

    .view-counter img {
      width: 16px;
      height: 16px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;

      padding: 24px 36px;
      border-radius: 38px;

      background: rgba(0,0,0,0.12);
      border: 1px solid rgba(255, 170, 210, 0.50);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18),
        0 0 16px rgba(255,255,255,0.10),
        0 0 18px rgba(255, 170, 210, 0.10);

      backdrop-filter: blur(14px);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .pfp-wrap {
      position: relative;
      width: 95px;
      height: 95px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile-pic {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      object-fit: cover;
    }

    .name {
      font-size: 2rem;
      font-weight: 900;
    }

    .cursor { animation: blink 1s infinite; }

    @keyframes blink {
      0%,100%{opacity:1;}
      50%{opacity:0;}
    }

    .links img {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      padding: 3px;
      border: 1px solid rgba(255, 170, 210, 0.45);
      transition: 0.2s;
    }

    .links img:hover {
      transform: scale(1.12);
    }

    /* VOLUME (RESTORED) */
    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 22px;
      padding: 6px 10px;
      border-radius: 14px;
      background: rgba(0,0,0,0.10);
      border: 1px solid rgba(255, 170, 210, 0.45);
      backdrop-filter: blur(12px);
    }

    input[type="range"] {
      width: 70px;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="fog"></div>

<div class="rain-side left" id="leftRain"></div>
<div class="rain-side right" id="rightRain"></div>

<div class="intro" onclick="enterSite()">click to enter &lt;3</div>

<audio id="rain" src="sounds/rain.mp3" loop></audio>

<div id="content">

  <!-- VIEW COUNTER BACK -->
  <div class="view-counter">
    <img src="assets/viewcounter.png">
    <span>[DISABLED]</span>
  </div>

  <div class="card">

    <div class="pfp-wrap">
      <img src="assets/pfp.png" class="profile-pic">
    </div>

    <div>
      <div style="display:flex; align-items:center; gap:10px;">
        <div id="typedName" class="name"></div>
        <span class="cursor">|</span>
      </div>
      <div style="opacity:0.7;">.nighty_</div>
    </div>

    <div class="links">
      <a href="#"><img src="assets/robloxbutton.png"></a>
      <a href="#"><img src="assets/discordbutton.png"></a>
    </div>

  </div>

  <!-- VOLUME SLIDER BACK -->
  <div class="volume-wrap">
    <img src="https://cdn-icons-png.flaticon.com/512/727/727269.png">
    <input type="range" min="0" max="1" step="0.01" value="0.05"
      oninput="document.getElementById('rain').volume = this.value">
  </div>

</div>

<script>
const rain = document.getElementById("rain");

function spawnRain(container) {
  for (let i = 0; i < 25; i++) {
    const d = document.createElement("div");
    d.className = "drop";
    d.style.left = Math.random() * 100 + "px";
    d.style.animationDuration = (0.8 + Math.random()) + "s";
    container.appendChild(d);
  }
}

spawnRain(leftRain);
spawnRain(rightRain);

function enterSite() {
  document.querySelector(".intro").classList.add("fade-out");
  document.getElementById("content").classList.add("visible");

  rain.volume = 0.05;
  rain.play();

  setTimeout(() => {
    document.querySelector(".intro").style.display = "none";
  }, 1200);

  animateName();
}

const nameText = "Angel";
let ni = 0;
let forward = true;

function animateName() {
  const el = document.getElementById("typedName");

  if (forward) {
    ni++;
    el.textContent = nameText.substring(0, ni);

    if (ni === nameText.length) {
      forward = false;
      setTimeout(animateName, 1200);
      return;
    }
  } else {
    ni--;
    el.textContent = nameText.substring(0, ni);

    if (ni === 1) {
      forward = true;
      setTimeout(animateName, 900);
      return;
    }
  }

  setTimeout(animateName, 220);
}
</script>

</body>
</html>
